name: Build And Deploy

on:
    workflow_dispatch:

jobs:
    Build:
        runs-on: ubuntu-latest

        steps:
            # get the  code
            - name: Get the code
              uses: actions/checkout@v7

            # install node
            - name: Install Node
              uses: actions/setup-node@v6
              with:
                node-version: 22.x
            
            # install dependencies
            - name: Install dependencies
              run: npm i
            # build

            - name: Build
              run: npm run build

            - name: Uploadload Artifact
              uses: actions/upload-artifact@v7
              with:
                name: build_result
                path: ./dist
    Deploy:
        runs-on: ubuntu-latest
        needs: [Build]
        steps:
            - name: Download Artifact
              uses: actions/download-artifact@v8
              with:
                name: build_result
                path: ./dist

            - name: Upload via FTP
              uses: pontago/lftp-deploy-action@master
              with:
                protocol: ftp
                host: ftpupload.net
                username: if0_42400053
                password: ${{secrets.FTP_PASSWORD}} 
                local_dir: ./dist
                remote_dir: ./htdocs

